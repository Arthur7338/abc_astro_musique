<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abécédaire de l'astro-musique</title>

  <!-- Google Font élégante -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <style>

    /* Lien dans ton abécédaire */
    a {
      color: #1e90ff;       /* couleur normale */
      text-decoration: none; /* pas de soulignement */
    }
    
    a:hover {
      color: #ff6347;       /* couleur au survol */
      text-decoration: underline; /* souligné au survol */
    }
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #ffffff;
      margin: 0;
      padding: 2rem;
      color: #333;
    }

    /* Style pour les crédits */
    #credits {
      text-align: center;      
      font-size: 0.9em;        
      color: #555;             
      margin-top: 40px;        
      padding: 10px;           
      border-top: 1px solid #ccc;
      font-family: "Arial", sans-serif;
    }

    h1 {
      text-align: center;
      margin-bottom: 2.5rem;
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
    }

    .alphabet {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
      gap: 1rem;
      max-width: 600px;
      margin: 0 auto 3rem;
    }

    .letter {
      background: #1e1e1e;
      border-radius: 14px;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      font-size: 1.4rem;
      font-weight: 500;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      transition: transform 0.2s ease, background 0.2s ease;
      color: #fff;
    }

    .letter:hover {
      transform: translateY(-4px);
      background: #333;
    }

    .content {
      max-width: 900px;
      margin: 0 auto;
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      display: none;
      gap: 2.5rem;
      align-items: center;
      background: url('images/partition_espace_4.png') no-repeat center center;
      background-size: cover;
      position: relative;
    }

    .content::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
      border-radius: 20px;
    }

    .content.active {
      display: flex;
    }

    .text {
      flex: 1;
      color: #fff;
      position: relative;
      z-index: 1;
    }

    .text h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2.3rem;
      margin-bottom: 1rem;
    }

    .text p {
      font-size: 1.2rem;
      line-height: 1.7;
      max-width: 420px;
    }

    .icon {
      flex: 1;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .icon img {
      width: 100%;
      max-width: 360px;
      height: auto;
      object-fit: contain;
      border-radius: 16px;
    }

    @media (max-width: 700px) {
      .content.active {
        flex-direction: column;
        text-align: center;
      }

      .text p {
        max-width: 100%;
      }
    }
  </style>
</head>
  
<body>

  <h1>Abécédaire de l'astro-musique</h1>

  <div class="alphabet" id="alphabet"></div>

  <div class="content" id="content">
    <div class="text">
      <h2 id="word"></h2>
      <p id="description"></p>
    </div>
    <div class="icon">
      <img id="icon" alt="" />
    </div>
  </div>

  <script>
    const data = {
      A: { img: "images/A_v2.png", word: "Armstrong", text: "Neil Armstrong, premier homme à marcher sur la Lune, et Louis Armstrong, trompettiste de jazz." },
      B: { img: "images/B_v2.png", word: "Big Band.g", text: "Un orchestre de jazz, mais aussi l’origine de l’Univers — on n’est pas à une lettre près. Dans les deux cas, ça déborde d’énergie !" },
      C: { img: "images/C_v2.png", word: "Composition", text: "La composition chimique d’une étoile ou d’une planète, et la composition musicale." },
      D: { img: "images/D_v2.png", word: "Disque", text: "Le disque que l’on écoute, et celui qui gravite autour des astres — comme les anneaux de Saturne." },
      E: { img: "images/E_v2.png", word: "Espace", text: "Il y en a entre les astres… et il en faut entre les notes !" },
      F: { img: "images/F_v2.png", word: "Fréquence", text: "La lumière et le son sont des ondes, toutes deux caractérisées par une fréquence." },
      G: { img: "images/G_v2.png", word: "Gustav Holst", text: "Au début du XXᵉ siècle, il a composé une œuvre pour grand orchestre : Les Planètes." },
      H: { img: "images/H_v2.png", word: "Hertz", text: "Une unité de mesure qui définit les fréquences, qu’elles soient sonores ou lumineuses." },
      I: { img: "images/I_v2.png", word: "Instrument", text: "Instrument de musique ou instrument de mesure." },
      J: { img: "images/J_v2.png", word: "John Lennon", text: "John Lennon? C'est un cratère sur Mercure, nommé officiellement en 2013 par l’Union astronomique internationale." },
      K: { img: "images/K_v2.png", word: "Kepler", text: "Astronome (et astro-musicien ?) allemand du XVIIᵉ siècle. Il a écrit un livre dans lequel il attribue aux planètes un thème musical." },
      L: { img: "images/L_v2.png", word: "Lyre", text: "La nébuleuse de la Lyre est une étoile en fin de vie qui expulse son enveloppe dans l’espace. La Lyre est aussi un instrument de musique." },
      M: { img: "images/M_v2.png", word: "May, Brian", text: "Le guitariste de Queen, qui a également rédigé une thèse en astrophysique : Étude des vitesses radiales dans le nuage de poussière zodiacal (traduction française)." },
      N: { img: "images/N_v2.png", word: "Nocturne", text: "Les Nocturnes de Chopin : 21 morceaux pour piano seul. L’astronomie, elle, se pratique souvent la nuit!" },
      O: { img: "images/O_v2.png", word: "Onde", text: "Le son et la lumière sont des… ondes !" },
      P: { img: "images/P_v2.png", word: "Pythagore", text: "Un pionnier de l’astro-musique ! L’harmonie des sphères, c’est lui. Selon cette théorie, les distances entre les planètes correspondraient à des intervalles musicaux." },
      Q: { img: "images/Q_v2.png", word: "Quintette", text: "Le « quintette de Stephan » est un regroupement de cinq galaxies découvert par l’astronome français Édouard Stephan à la fin du XIXᵉ siècle. Un quintette, c’est aussi un ensemble de cinq musiciens." },
      R: { img: "images/R_v2.png", word: "Rave", text: "Une rave party ? Oui ! Mais RAVE signifie aussi RAdial Velocity Experiment, un programme qui observe les étoiles de notre galaxie." },
      S: { img: "images/S_v2.png", word: "Silence", text: "Le silence spatial, la pause musicale." },
      T: { img: "images/T_v2.png", word: "Triangle", text: "L’instrument de musique, et aussi le Triangle d’été, formé par trois étoiles : Véga, Deneb et Altaïr." },
      U: { img: "images/U_v2.png", word: "UT", text: "Pour lire la musique, on utilise des clés : la clé de Sol, la clé de Fa… et aussi la clé d’UT. U.T., c’est également Universal Time, le temps universel, déterminé par des observations astronomiques." },
      V: { img: "images/V_v2.png", word: "Variation", text: "On pense à la variation d’un thème musical, mais aussi aux étoiles variables." },
      W: { img: "images/W_v2.png", word: "Watt", text: "La puissance d’une enceinte se mesure en watts (énergie acoustique). On mesure aussi la puissance rayonnée par une étoile en watts (luminosité)." },
      X: { img: "images/X_v2.png", word: "X-ray blues", text: "C’est un blues de Ray Charles… et des rayons X : des ondes très énergétiques produites par certains astres." },
      Y: { img: "images/Y_v2.png", word: "Young", text: "Il y a Neil Young, le musicien. Il y a aussi Thomas Young, le physicien, qui a prouvé grâce à une expérience que la lumière était une onde, au même titre que le son." },
      Z: { 
        img: "images/Z_v2.png", 
        word: "Zéphyr", 
        text: "Le Trio à cordes Zéphyr, qui joue dans <a href='https://www.waterbabiesproduction.com/les4saisonsdelunivers' target='_blank'>les 4 saisons de l’Univers</a>, partage son nom avec un astéroïde de 2 km, considéré comme potentiellement dangereux pour la Terre." 
      }
    };
    
    // Au clic
    document.getElementById("description").innerHTML = data["Z"].text;
    
    const alphabetDiv = document.getElementById("alphabet");
    const contentDiv = document.getElementById("content");

    for (let i = 65; i <= 90; i++) {
      const letter = String.fromCharCode(i);
      const div = document.createElement("div");
      div.className = "letter";
      div.textContent = letter;

      div.onclick = () => {
        if (!data[letter]) return;

        document.getElementById("icon").src = data[letter].img;
        document.getElementById("icon").alt = data[letter].word;
        document.getElementById("word").textContent = `${letter} — ${data[letter].word}`;
        document.getElementById("description").innerHTML = data[letter].text;
        //document.getElementById("description").textContent = data[letter].text;

        contentDiv.classList.add("active");
      };

      alphabetDiv.appendChild(div);
    }
  </script>

  <footer id="credits">
  <p>Conception : Arthur Choplin, Guillaume Gardey de Soos | Visuels : Erica Durance</p>
    
</footer>
</body>
</html>
