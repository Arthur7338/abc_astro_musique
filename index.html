<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abécédaire interactif</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f6f7fb;
      margin: 0;
      padding: 2rem;
      color: #333;
    }

    h1 {
      text-align: center;
      margin-bottom: 2rem;
    }

    .alphabet {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
      gap: 1rem;
      max-width: 600px;
      margin: 0 auto 2rem;
    }

    .letter {
      background: white;
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      font-size: 1.5rem;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .letter:hover {
      transform: translateY(-3px);
      background: #eef2ff;
    }

    .content {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      display: none;
      gap: 2rem;
      align-items: center;
      flex-direction: row;
    }

    .content.active {
      display: flex;
      flex-direction: row;      /* Texte à gauche, image à droite */
      gap: 2rem;
      align-items: center;
      justify-content: space-between;
    }

    .text {
      flex: 1;
    }

    .icon {
      flex: 1;
      text-align: center;
      margin-bottom: 1rem;
    }

    .icon img {
      width: 100%;
      max-width: 300px;
      height: auto;
      object-fit: contain;
    }

    @media (max-width: 600px) {
      .content.active {
        flex-direction: column;
      }
      .icon img {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <h1>📘 Mon abécédaire</h1>

  <div class="alphabet" id="alphabet"></div>

  <div class="content" id="content">
    <div class="text">
      <h2 id="word"></h2>
      <p id="description"></p>
    </div>
    <div class="icon">
      <img id="icon" alt="" />
    </div>
  </div>

  <script>
    const data = {
      A: { img: "images/A_v2.png", word: "Abricot", text: "Un fruit sucré et orangé, symbole de l'été." },
      B: { img: "images/B_v2.png", word: "Bibliothèque", text: "Un lieu rempli de livres et de connaissances." },
      C: { img: "images/C_v2.png", word: "Chat", text: "Un animal curieux et indépendant." }
      // Ajoute les autres lettres ici jusqu'à Z
    };

    const alphabetDiv = document.getElementById("alphabet");
    const contentDiv = document.getElementById("content");

    for (let i = 65; i <= 90; i++) {
      const letter = String.fromCharCode(i);
      const div = document.createElement("div");
      div.className = "letter";
      div.textContent = letter;

      div.onclick = () => {
        if (!data[letter]) return;
        const img = document.getElementById("icon");
        img.src = data[letter].img;
        img.alt = data[letter].word;
        document.getElementById("word").textContent = `${letter} — ${data[letter].word}`;
        document.getElementById("description").textContent = data[letter].text;
        contentDiv.classList.add("active");
      };

      alphabetDiv.appendChild(div);
    }
  </script>

</body>
</html>
