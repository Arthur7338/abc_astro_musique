<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abécédaire de l'astro-musique</title>

  <!-- Google Font élégante -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #ffffff;
      margin: 0;
      padding: 2rem;
      color: #333;
    }

    h1 {
      text-align: center;
      margin-bottom: 2.5rem;
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
    }

    .alphabet {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
      gap: 1rem;
      max-width: 600px;
      margin: 0 auto 3rem;
    }

    .letter {
      background: #1e1e1e;
      border-radius: 14px;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      font-size: 1.4rem;
      font-weight: 500;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      transition: transform 0.2s ease, background 0.2s ease;
      color: #fff;
    }

    .letter:hover {
      transform: translateY(-4px);
      background: #333;
    }

    .content {
      max-width: 900px;
      margin: 0 auto;
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      display: none;
      gap: 2.5rem;
      align-items: center;
      background: url('images/partition_espace_4.png') no-repeat center center;
      background-size: cover;
      position: relative;
    }

    .content::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
      border-radius: 20px;
    }

    .content.active {
      display: flex;
    }

    .text {
      flex: 1;
      color: #fff;
      position: relative;
      z-index: 1;
    }

    .text h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2.3rem;
      margin-bottom: 1rem;
    }

    .text p {
      font-size: 1.2rem;
      line-height: 1.7;
      max-width: 420px;
    }

    .icon {
      flex: 1;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .icon img {
      width: 100%;
      max-width: 360px;
      height: auto;
      object-fit: contain;
      border-radius: 16px;
    }

    @media (max-width: 700px) {
      .content.active {
        flex-direction: column;
        text-align: center;
      }

      .text p {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <h1>Mon abécédaire illustré</h1>

  <div class="alphabet" id="alphabet"></div>

  <div class="content" id="content">
    <div class="text">
      <h2 id="word"></h2>
      <p id="description"></p>
    </div>
    <div class="icon">
      <img id="icon" alt="" />
    </div>
  </div>

  <script>
    const data = {
      A: { img: "images/A_v2.png", word: "Armstrong", text: "L'astronaute Neil Armstrong et le trompettiste Luis Armstrong" },
      B: { img: "images/B_v2.png", word: "Big Band.g", text: "Un orchestre de jazz mais aussi l'origine de l'Univers (on est pas à une lettre près). Dans les deux cas, il y a de l'énergie en jeu!" },
      C: { img: "images/C_v2.png", word: "Composition", text: "La composition chimique d'une étoile, d'une planète. Une composition musicale" },
      D: { img: "images/D_v2.png", word: "Disque", text: "Le disque que l'on écoute et celui qui tourne autour des astres (les anneaux de Saturne notamment)" },
      E: { img: "images/E_v2.png", word: "Espace", text: "Il y en a entre les astres, il en faut entre les notes!" },
      F: { img: "images/F_v2.png", word: "Fréquence", text: "La lumière et le son sont des ondes qui peuvent être caractérisées par une fréquence" },
      G: { img: "images/G_v2.png", word: "Gustav Holst", text: "Il a composé, au début du 20ème siècle, une oeuvre pour grand orchestre: Les Planètes" },
      H: { img: "images/H_v2.png", word: "Hertz", text: "Une unité de mesure, qui définit les fréquences (sonores, lumineuses)" },
      I: { img: "images/I_v2.png", word: "Instrument", text: "Instrument de musique ou de mesure." },
      J: { img: "images/J_v2.png", word: "John Lennon", text: "John Lennon, c'est un cratère sur Mercure, nommé officiellemnt en 2013 par l'Union Astronomique Internationale." },
      K: { img: "images/K_v2.png", word: "Kepler", text: "Un astronome (astro-musicien?) allemand du 17ème siècle. Il a écrit un livre dans lequel il attribue aux planètes un thème musical." },
      L: { img: "images/L_v2.png", word: "Lyre", text: "La nébuleuse de la lyre, c’est une étoile en fin de vie qui expulse son enveloppe dans l’espace. La lyre, c’est aussi un instrument de musique." },
      M: { img: "images/M_v2.png", word: "May, Brian", text: "Le guitariste du groupe Queen. Il a aussi fait une thèse en astrophysique intitulée (traduction en français) 'Étude des vitesses radiales dans le nuage de poussière zodiacal' " },
      N: { img: "images/N_v2.png", word: "Nocturne", text: "Les Nocturnes de Chopin, 21 morceaux de musique romantique pour piano seul. Et l’astronomie c’est une discipline assez nocturne..." },
      O: { img: "images/O_v2.png", word: "Onde", text: "Le son et la lumière sont des... ondes " },
      P: { img: "images/P_v2.png", word: "Pythagore", text: "Un pionnier de l’astro musique! L’harmonie des sphères, c’est de lui. C’est cette théorie selon laquelle il existerait des liens étroits entre musique et astronomie. Les distances entre planètes correspondraient à des intervalles musicaux" },
      Q: { img: "images/Q_v2.png", word: "Quintette", text: "Le 'quintette de Stephan', c’est un regroupement de 5 galaxies découvert par l’astronome français Edouard Stephan à la fin du XIXème siècle. Un quintette, c’est aussi un ensemble de 5 instrumentistes." },
      R: { img: "images/R_v2.png", word: "Rave", text: "Une Rave party. Plus sérieusement, RAVE c’est aussi un acronyme pour RAdial Velocity Experiment, qui est un programme d’observation des étoiles de notre galaxie." },
      S: { img: "images/S_v2.png", word: "Silence", text: "Le silence spatial, la pause musicale." },
      T: { img: "images/T_v2.png", word: "Triangle", text: "L’instrument de musique, et aussi le triangle d’été, formé par 3 étoiles (Véga, Déneb et Altaïr)." },
      U: { img: "images/U_v2.png", word: "UT", text: "Pour lire la musique, on utilise des clés. La clé de Sol, la clé de Fa. Il y a aussi la clé d’UT. Et U.T. c’est aussi Universal Time = le temps universel, déterminé par des observations astronomiques." },
      V: { img: "images/V_v2.png", word: "Variation", text: "On pense à la variation d’un thème musical, mais aussi aux étoiles variables." },
      W: { img: "images/W_v2.png", word: "Watt", text: "La puissance d’une enceinte se mesure en Watt (c’est l’énergie acoustique). On mesure aussi la puissance rayonnée par une étoile en Watt (la luminosité)." },
      X: { img: "images/X_v2.png", word: "X-ray blues", text: "C’est un blues de Ray Charles. Et les rayons X, c’est une forme de rayonnement très énergétique qu'émettent certains astres dans l’espace." },
      Y: { img: "images/Y_v2.png", word: "Young", text: "Il y a Neil Young, le musicien. Il y a aussi Thomas Young, un physicien qui a prouvé grâce à une expérience que la lumière était une onde, au même titre que le son." },
      Z: { img: "images/Z_v2.png", word: "Zéphyr", text: "Le Trio à cordes Zéphyr, qui joue notamment dans les « 4 saisons de l’Univers ». Mais Zéphyr, c’est aussi le nom d’un astéroïde, assez gros, 2 km environ, classé comme potentiellement dangereux pour la Terre..." }
    };

    const alphabetDiv = document.getElementById("alphabet");
    const contentDiv = document.getElementById("content");

    for (let i = 65; i <= 90; i++) {
      const letter = String.fromCharCode(i);
      const div = document.createElement("div");
      div.className = "letter";
      div.textContent = letter;

      div.onclick = () => {
        if (!data[letter]) return;

        document.getElementById("icon").src = data[letter].img;
        document.getElementById("icon").alt = data[letter].word;
        document.getElementById("word").textContent = `${letter} — ${data[letter].word}`;
        document.getElementById("description").textContent = data[letter].text;

        contentDiv.classList.add("active");
      };

      alphabetDiv.appendChild(div);
    }
  </script>

</body>
</html>
