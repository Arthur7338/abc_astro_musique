<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abécédaire interactif</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #ffffff;  /* fond de la page blanc */
      margin: 0;
      padding: 2rem;
      color: #333;
    }

    h1 {
      text-align: center;
      margin-bottom: 2rem;
      color: #333;
    }

    .alphabet {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
      gap: 1rem;
      max-width: 600px;
      margin: 0 auto 2rem;
    }

    .letter {
      background: #1e1e1e;  /* fond sombre pour les cases */
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      font-size: 1.5rem;
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
      transition: transform 0.15s ease, background 0.15s ease;
      color: #fff;
    }

    .letter:hover {
      transform: translateY(-3px);
      background: #333333;
    }

    .content {
      max-width: 800px;
      margin: 0 auto;
      background: #1e1e1e;  /* fond sombre du texte */
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      display: none;
      gap: 2rem;
      align-items: center;
      flex-direction: row;
    }

    .content.active {
      display: flex;
      flex-direction: row;
      gap: 2rem;
      align-items: center;
      justify-content: space-between;
    }

    .text {
      flex: 1;
      color: #fff;
    }

    .icon {
      flex: 1;
      text-align: center;
      margin-bottom: 1rem;
    }

    .icon img {
      width: 100%;
      max-width: 300px;
      height: auto;
      object-fit: contain;
    }

    @media (max-width: 600px) {
      .content.active {
        flex-direction: column;
      }
      .icon img {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <h1>📘 Mon abécédaire</h1>

  <div class="alphabet" id="alphabet"></div>

  <div class="content" id="content">
    <div class="text">
      <h2 id="word"></h2>
      <p id="description"></p>
    </div>
    <div class="icon">
      <img id="icon" alt="" />
    </div>
  </div>

  <script>
    const data = {
      A: { img: "images/A_v2.png", word: "Armstrong", text: "L'astronaute Neil Armstrong et le trompettiste Luis Armstrong" },
      B: { img: "images/B_v2.png", word: "Big Bang.d", text: "L'origine de l'Univers ou l'ensemble musical. Dans les deux cas, il y a de l'énergie en jeu!" },
      C: { img: "images/C_v2.png", word: "Composition", text: "La composition chimique d'une étoile, d'une planète. Une composition musicale" }
      D: { img: "images/D_v2.png", word: "Disque", text: "Le disque qui tourne autour des astres (les anneaux de Saturne par exemple), ou celui qu'on écoute" }
      E: { img: "images/E_v2.png", word: "Espace", text: "Il y en a entre les astres, il en faut entre les notes!" }
      F: { img: "images/F_v2.png", word: "Fréquence", text: "La lumière et le son sont des ondes qui peuvent être caractérisés par une fréquence" }
      G: { img: "images/G_v2.png", word: "Gustav Holst", text: "Le compisteur des planètes" }
      H: { img: "images/H_v2.png", word: "Hertz", text: "L'unité de la fréquence" }
      I: { img: "images/I_v2.png", word: "Instrument", text: "Un animal curieux et indépendant." }
      J: { img: "images/J_v2.png", word: "John Lennon", text: "Un animal curieux et indépendant." }
      K: { img: "images/K_v2.png", word: "Kepler", text: "Un animal curieux et indépendant." }
      L: { img: "images/L_v2.png", word: "Lyre", text: "Un animal curieux et indépendant." }
      M: { img: "images/M_v2.png", word: "May, Brian", text: "Un animal curieux et indépendant." }
      N: { img: "images/N_v2.png", word: "Nocturne", text: "Un animal curieux et indépendant." }
      O: { img: "images/O_v2.png", word: "Onde", text: "Un animal curieux et indépendant." }
      P: { img: "images/P_v2.png", word: "Pythagore", text: "Un animal curieux et indépendant." }
      Q: { img: "images/Q_v2.png", word: "Quintette", text: "Un animal curieux et indépendant." }
      R: { img: "images/R_v2.png", word: "Rave", text: "Un animal curieux et indépendant." }
      S: { img: "images/S_v2.png", word: "Silence", text: "Un animal curieux et indépendant." }
      T: { img: "images/T_v2.png", word: "Triangle", text: "Un animal curieux et indépendant." }
      U: { img: "images/U_v2.png", word: "UT", text: "Un animal curieux et indépendant." }
      V: { img: "images/V_v2.png", word: "Variation", text: "Un animal curieux et indépendant." }
      W: { img: "images/W_v2.png", word: "Watt", text: "Un animal curieux et indépendant." }
      X: { img: "images/X_v2.png", word: "X-ray blues", text: "Un animal curieux et indépendant." }
      Y: { img: "images/Y_v2.png", word: "Young", text: "Un animal curieux et indépendant." }
      Z: { img: "images/Z_v2.png", word: "Zéphyr", text: "Un animal curieux et indépendant." }
      // Ajoute les autres lettres ici jusqu'à Z
    };

    const alphabetDiv = document.getElementById("alphabet");
    const contentDiv = document.getElementById("content");

    for (let i = 65; i <= 90; i++) {
      const letter = String.fromCharCode(i);
      const div = document.createElement("div");
      div.className = "letter";
      div.textContent = letter;

      div.onclick = () => {
        if (!data[letter]) return;
        const img = document.getElementById("icon");
        img.src = data[letter].img;
        img.alt = data[letter].word;
        document.getElementById("word").textContent = `${letter} — ${data[letter].word}`;
        document.getElementById("description").textContent = data[letter].text;
        contentDiv.classList.add("active");
      };

      alphabetDiv.appendChild(div);
    }
  </script>

</body>
</html>
